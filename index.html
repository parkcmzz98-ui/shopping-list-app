<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 28px 24px 20px;
      color: #fff;
    }

    .header h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }

    .header .meta {
      margin-top: 6px;
      font-size: 0.8rem;
      opacity: 0.75;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .db-badge {
      background: rgba(255,255,255,0.2);
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 0.72rem;
    }

    .header .summary { margin-top: 4px; font-size: 0.85rem; opacity: 0.85; }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 20px 20px 0;
    }

    .input-area input {
      flex: 1;
      padding: 12px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus { border-color: #667eea; }

    .input-area button {
      padding: 12px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .input-area button:hover { background: #5a6fd6; }
    .input-area button:active { transform: scale(0.95); }
    .input-area button:disabled { background: #a5b4fc; cursor: not-allowed; }

    .filters {
      display: flex;
      gap: 6px;
      padding: 14px 20px 0;
    }

    .filters button {
      padding: 5px 14px;
      border-radius: 20px;
      border: 2px solid #e2e8f0;
      background: transparent;
      font-size: 0.8rem;
      cursor: pointer;
      color: #64748b;
      transition: all 0.15s;
    }

    .filters button.active {
      background: #667eea;
      border-color: #667eea;
      color: #fff;
    }

    .list {
      padding: 12px 20px 8px;
      min-height: 60px;
    }

    .empty {
      text-align: center;
      color: #94a3b8;
      padding: 32px 0;
      font-size: 0.9rem;
    }

    .loading {
      text-align: center;
      color: #94a3b8;
      padding: 32px 0;
      font-size: 0.9rem;
    }

    .loading::after {
      content: '';
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #e2e8f0;
      border-top-color: #667eea;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-left: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      border-radius: 10px;
      margin-bottom: 6px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      transition: opacity 0.2s, background 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item.checked { opacity: 0.55; background: #f1f5f9; }

    .item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #1e293b;
      word-break: break-all;
    }

    .item.checked .item-text { text-decoration: line-through; color: #94a3b8; }

    .del-btn {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      color: #cbd5e1;
      padding: 2px 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .del-btn:hover { color: #ef4444; background: #fee2e2; }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px 20px;
      border-top: 1px solid #f1f5f9;
    }

    .footer span { font-size: 0.8rem; color: #94a3b8; }

    .clear-btn {
      font-size: 0.8rem;
      color: #ef4444;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .clear-btn:hover { background: #fee2e2; }
    .clear-btn:disabled { opacity: 0.3; cursor: default; background: none; }

    .error-msg {
      background: #fee2e2;
      color: #dc2626;
      font-size: 0.8rem;
      padding: 8px 14px;
      border-radius: 8px;
      margin: 0 20px 12px;
      display: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>🛒 쇼핑 리스트</h1>
      <div class="meta">
        <span class="db-badge">☁️ Supabase</span>
        <span id="syncStatus">동기화 중...</span>
      </div>
      <p class="summary" id="summary">항목 0개 · 완료 0개</p>
    </div>

    <div class="input-area">
      <input id="itemInput" type="text" placeholder="아이템을 입력하세요..." maxlength="80" />
      <button id="addBtn" title="추가">＋</button>
    </div>

    <div class="filters">
      <button class="active" data-filter="all">전체</button>
      <button data-filter="active">미완료</button>
      <button data-filter="done">완료</button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="list" id="list">
      <div class="loading">데이터 불러오는 중</div>
    </div>

    <div class="footer">
      <span id="footerInfo"></span>
      <button class="clear-btn" id="clearDone">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    // ── Supabase 설정 ──────────────────────────────────────────
    const SUPABASE_URL  = 'https://ypwauisaltfehqtlvskl.supabase.co';
    const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlwd2F1aXNhbHRmZWhxdGx2c2tsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MjQwMjMsImV4cCI6MjA4OTUwMDAyM30.1BA8QYjmk9Z2YDN3zVzBAsUVTfshYsvXo_PlLAN8_04';
    const TABLE         = 'shopping_items';
    const API           = `${SUPABASE_URL}/rest/v1/${TABLE}`;
    const HEADERS       = {
      'apikey':        SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type':  'application/json',
      'Prefer':        'return=representation'
    };

    // ── 상태 ──────────────────────────────────────────────────
    let items  = [];
    let filter = 'all';

    // ── DOM ───────────────────────────────────────────────────
    const input      = document.getElementById('itemInput');
    const addBtn     = document.getElementById('addBtn');
    const listEl     = document.getElementById('list');
    const summary    = document.getElementById('summary');
    const footerInfo = document.getElementById('footerInfo');
    const clearDone  = document.getElementById('clearDone');
    const syncStatus = document.getElementById('syncStatus');
    const errorMsg   = document.getElementById('errorMsg');
    const filterBtns = document.querySelectorAll('.filters button');

    // ── Supabase API 헬퍼 ─────────────────────────────────────
    async function dbFetch(url, options = {}) {
      const res = await fetch(url, { headers: HEADERS, ...options });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || `HTTP ${res.status}`);
      }
      return res.status === 204 ? null : res.json();
    }

    function showError(msg) {
      errorMsg.textContent = '⚠️ ' + msg;
      errorMsg.style.display = 'block';
      setTimeout(() => { errorMsg.style.display = 'none'; }, 4000);
    }

    // ── DB CRUD ───────────────────────────────────────────────
    async function loadItems() {
      syncStatus.textContent = '동기화 중...';
      try {
        const data = await dbFetch(`${API}?order=created_at.desc`);
        items = data;
        syncStatus.textContent = '✓ 동기화됨';
        render();
      } catch (e) {
        syncStatus.textContent = '⚠️ 오프라인';
        showError('데이터를 불러오지 못했습니다: ' + e.message);
        listEl.innerHTML = '<div class="empty">데이터를 불러오지 못했습니다.</div>';
      }
    }

    async function addItem() {
      const text = input.value.trim();
      if (!text) { input.focus(); return; }

      const newItem = {
        id:      Date.now().toString(),
        text,
        checked: false
      };

      // 낙관적 업데이트
      items.unshift(newItem);
      input.value = '';
      addBtn.disabled = true;
      render();

      try {
        const [saved] = await dbFetch(API, {
          method: 'POST',
          body: JSON.stringify(newItem)
        });
        // 서버 응답으로 교체 (created_at 등 반영)
        items = items.map(i => i.id === newItem.id ? saved : i);
        render();
      } catch (e) {
        // 롤백
        items = items.filter(i => i.id !== newItem.id);
        render();
        showError('추가 실패: ' + e.message);
      } finally {
        addBtn.disabled = false;
        input.focus();
      }
    }

    async function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;

      // 낙관적 업데이트
      item.checked = !item.checked;
      render();

      try {
        await dbFetch(`${API}?id=eq.${id}`, {
          method: 'PATCH',
          body: JSON.stringify({ checked: item.checked })
        });
      } catch (e) {
        // 롤백
        item.checked = !item.checked;
        render();
        showError('업데이트 실패: ' + e.message);
      }
    }

    async function removeItem(id) {
      const prev = [...items];
      items = items.filter(i => i.id !== id);
      render();

      try {
        await dbFetch(`${API}?id=eq.${id}`, { method: 'DELETE' });
      } catch (e) {
        items = prev;
        render();
        showError('삭제 실패: ' + e.message);
      }
    }

    async function clearChecked() {
      const prev = [...items];
      const toDelete = items.filter(i => i.checked).map(i => i.id);
      if (!toDelete.length) return;

      items = items.filter(i => !i.checked);
      render();

      try {
        await dbFetch(`${API}?id=in.(${toDelete.join(',')})`, { method: 'DELETE' });
      } catch (e) {
        items = prev;
        render();
        showError('삭제 실패: ' + e.message);
      }
    }

    // ── 렌더링 ────────────────────────────────────────────────
    function render() {
      const total  = items.length;
      const done   = items.filter(i => i.checked).length;
      const active = total - done;

      summary.textContent    = `항목 ${total}개 · 완료 ${done}개`;
      footerInfo.textContent = `미완료 ${active}개`;
      clearDone.disabled     = done === 0;

      const visible = items.filter(i =>
        filter === 'all'    ? true :
        filter === 'active' ? !i.checked : i.checked
      );

      if (visible.length === 0) {
        listEl.innerHTML = `<div class="empty">${
          filter === 'done'   ? '완료된 항목이 없습니다.' :
          filter === 'active' ? '미완료 항목이 없습니다.' :
                                '아이템을 추가해 보세요! 🎉'
        }</div>`;
        return;
      }

      listEl.innerHTML = visible.map(item => `
        <div class="item ${item.checked ? 'checked' : ''}" data-id="${item.id}">
          <input type="checkbox" ${item.checked ? 'checked' : ''}
                 onchange="toggleItem('${item.id}')" />
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="del-btn" onclick="removeItem('${item.id}')" title="삭제">✕</button>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── 이벤트 ────────────────────────────────────────────────
    addBtn.addEventListener('click', addItem);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
    clearDone.addEventListener('click', clearChecked);

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filter = btn.dataset.filter;
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    // ── 초기 로드 ─────────────────────────────────────────────
    loadItems();
  </script>
</body>
</html>
