<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 28px 24px 20px;
      color: #fff;
    }

    .header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header .summary {
      margin-top: 6px;
      font-size: 0.85rem;
      opacity: 0.85;
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 20px 20px 0;
    }

    .input-area input {
      flex: 1;
      padding: 12px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #667eea;
    }

    .input-area button {
      padding: 12px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.3rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .input-area button:hover { background: #5a6fd6; }
    .input-area button:active { transform: scale(0.95); }

    .filters {
      display: flex;
      gap: 6px;
      padding: 14px 20px 0;
    }

    .filters button {
      padding: 5px 14px;
      border-radius: 20px;
      border: 2px solid #e2e8f0;
      background: transparent;
      font-size: 0.8rem;
      cursor: pointer;
      color: #64748b;
      transition: all 0.15s;
    }

    .filters button.active {
      background: #667eea;
      border-color: #667eea;
      color: #fff;
    }

    .list {
      padding: 12px 20px 8px;
      min-height: 60px;
    }

    .empty {
      text-align: center;
      color: #94a3b8;
      padding: 32px 0;
      font-size: 0.9rem;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 14px;
      border-radius: 10px;
      margin-bottom: 6px;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      transition: opacity 0.2s, background 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item.checked {
      opacity: 0.55;
      background: #f1f5f9;
    }

    .item input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #667eea;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #1e293b;
      word-break: break-all;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .del-btn {
      background: none;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      color: #cbd5e1;
      padding: 2px 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .del-btn:hover {
      color: #ef4444;
      background: #fee2e2;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px 20px;
      border-top: 1px solid #f1f5f9;
    }

    .footer span {
      font-size: 0.8rem;
      color: #94a3b8;
    }

    .clear-btn {
      font-size: 0.8rem;
      color: #ef4444;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .clear-btn:hover { background: #fee2e2; }
    .clear-btn:disabled { opacity: 0.3; cursor: default; background: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header">
      <h1>🛒 쇼핑 리스트</h1>
      <p class="summary" id="summary">항목 0개 · 완료 0개</p>
    </div>

    <div class="input-area">
      <input id="itemInput" type="text" placeholder="아이템을 입력하세요..." maxlength="80" />
      <button id="addBtn" title="추가">＋</button>
    </div>

    <div class="filters">
      <button class="active" data-filter="all">전체</button>
      <button data-filter="active">미완료</button>
      <button data-filter="done">완료</button>
    </div>

    <div class="list" id="list"></div>

    <div class="footer">
      <span id="footerInfo"></span>
      <button class="clear-btn" id="clearDone">완료 항목 삭제</button>
    </div>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shopping') || '[]');
    let filter = 'all';

    const input    = document.getElementById('itemInput');
    const addBtn   = document.getElementById('addBtn');
    const listEl   = document.getElementById('list');
    const summary  = document.getElementById('summary');
    const footerInfo = document.getElementById('footerInfo');
    const clearDone  = document.getElementById('clearDone');
    const filterBtns = document.querySelectorAll('.filters button');

    function save() {
      localStorage.setItem('shopping', JSON.stringify(items));
    }

    function render() {
      const total   = items.length;
      const done    = items.filter(i => i.checked).length;
      const active  = total - done;

      summary.textContent = `항목 ${total}개 · 완료 ${done}개`;
      footerInfo.textContent = `미완료 ${active}개`;
      clearDone.disabled = done === 0;

      const visible = items.filter(i =>
        filter === 'all'    ? true :
        filter === 'active' ? !i.checked :
                               i.checked
      );

      if (visible.length === 0) {
        listEl.innerHTML = `<div class="empty">${
          filter === 'done'   ? '완료된 항목이 없습니다.' :
          filter === 'active' ? '미완료 항목이 없습니다.' :
                                '아이템을 추가해 보세요! 🎉'
        }</div>`;
        return;
      }

      listEl.innerHTML = visible.map(item => `
        <div class="item ${item.checked ? 'checked' : ''}" data-id="${item.id}">
          <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggle('${item.id}')" />
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="del-btn" onclick="remove('${item.id}')" title="삭제">✕</button>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addItem() {
      const text = input.value.trim();
      if (!text) { input.focus(); return; }
      items.unshift({ id: Date.now().toString(), text, checked: false });
      input.value = '';
      save(); render();
      input.focus();
    }

    function toggle(id) {
      const item = items.find(i => i.id === id);
      if (item) { item.checked = !item.checked; save(); render(); }
    }

    function remove(id) {
      items = items.filter(i => i.id !== id);
      save(); render();
    }

    addBtn.addEventListener('click', addItem);
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    clearDone.addEventListener('click', () => {
      items = items.filter(i => !i.checked);
      save(); render();
    });

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filter = btn.dataset.filter;
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
    });

    render();
  </script>
</body>
</html>
